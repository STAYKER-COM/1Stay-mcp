upstream mcp_backend {
    server mcp.stayker.com:443;
}

server {
    listen 3001;

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # OAuth discovery endpoints
    location /.well-known/ {
        proxy_pass https://mcp_backend/.well-known/;
        proxy_ssl_server_name on;
        proxy_set_header Host mcp.stayker.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP endpoint
    location /mcp {
        proxy_pass https://mcp_backend/mcp;
        proxy_ssl_server_name on;
        proxy_set_header Host mcp.stayker.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through auth and MCP headers
        proxy_pass_request_headers on;

        # Streaming support (SSE / chunked transfer)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts for long-lived MCP connections
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # HTTP 1.1 for keep-alive and chunked encoding
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    # Default — return 404 for unrecognized paths
    location / {
        return 404;
    }
}
